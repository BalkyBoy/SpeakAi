name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: speak-ai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/docker/Dockerfile
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/speak-ai.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/speak-ai.tar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      # ------------------------
      # Setup SSH
      # ------------------------
      - name: Debug connectivity
        run: |
                echo "Testing connection to ${{ secrets.EC2_HOST }}"
                timeout 5 bash -c "</dev/tcp/${{ secrets.EC2_HOST }}/22" && echo "Port 22 reachable" || echo "Port 22 NOT reachable"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ------------------------
      # Test SSH Connection
      # ------------------------
      - name: Test SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "echo ✅ Connected"

      # ------------------------
      # Copy Files
      # ------------------------
      - name: Copy Docker image to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa /tmp/speak-ai.tar ubuntu@${{ secrets.EC2_HOST }}:/tmp/

      # ------------------------
      # Deploy
      # ------------------------
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << EOF
            set -e

            echo "Loading new Docker image..."
            docker load -i /tmp/speak-ai.tar

            echo "Tagging new image..."
            docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

            cd ~/speak-ai/SpeakAi/server/deployment

            echo "Creating backup of current image..."
            docker tag $IMAGE_NAME:latest $IMAGE_NAME:backup || true

            echo "Stopping old container..."
            docker compose -f docker-compose-nginx.yml stop app || true

            echo "Starting new container..."
            docker compose -f docker-compose-nginx.yml up -d --no-deps app

            echo "Running health check..."

            for i in {1..30}; do
              if docker compose -f docker-compose-nginx.yml exec -T app curl -f http://localhost:5000/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi

              if [ \$i -eq 30 ]; then
                echo "❌ Health check failed. Rolling back..."
                docker compose -f docker-compose-nginx.yml stop app
                docker tag $IMAGE_NAME:backup $IMAGE_NAME:latest
                docker compose -f docker-compose-nginx.yml up -d --no-deps app
                exit 1
              fi

              sleep 10
            done

            echo "Cleaning up unused images..."
            docker image prune -f

            echo "Deployment completed successfully 🚀"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
