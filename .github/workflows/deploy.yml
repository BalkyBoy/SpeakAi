name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
        
    - name: Install dependencies
      run: |
        cd server
        pnpm install --no-frozen-lockfile
        
    - name: Run tests
      run: |
        cd server
        pnpm run test
        
    - name: Run linting
      run: |
        cd server
        pnpm run lint

  security-scan:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './server'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-server:
    needs: [detect-changes, test, security-scan]
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/server:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/server:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/server:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/server:buildcache,mode=max

  deploy:
    needs: [detect-changes, build-server]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-server.result == 'success' || needs.build-server.result == 'skipped')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_CHANGED: ${{ needs.detect-changes.outputs.server }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@$EC2_HOST << 'EOF'
          set -e

          cd ~/speak-ai/deployment

          # Login to GHCR
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$USER" --password-stdin

          # Pull new server image if changed
          if [ "$SERVER_CHANGED" = "true" ]; then
            echo "📦 Pulling server image..."
            docker pull $REGISTRY/$IMAGE_NAME/server:$IMAGE_TAG
            docker tag $REGISTRY/$IMAGE_NAME/server:$IMAGE_TAG speak-ai:latest
            
            # Create backup
            if docker compose -f docker-compose-nginx.yml ps -q app > /dev/null 2>&1; then
              echo "Creating backup..."
              docker tag speak-ai:latest speak-ai:backup-$(date +%Y%m%d-%H%M%S) || true
            fi
            
            # Run migrations
            echo "⏳ Running migrations..."
            docker compose -f docker-compose-nginx.yml up migrate --wait --wait-timeout 120 || true
            
            # Deploy new version
            echo "🚀 Deploying new version..."
            docker compose -f docker-compose-nginx.yml up -d --no-deps app
            
            # Health check
            echo "🔍 Performing health check..."
            for i in {1..30}; do
              if docker compose -f docker-compose-nginx.yml exec -T app curl -f http://localhost:5000/api/v1/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ Health check failed, rolling back..."
                docker compose -f docker-compose-nginx.yml stop app
                docker tag speak-ai:backup-$(date +%Y%m%d)* speak-ai:latest || true
                docker compose -f docker-compose-nginx.yml up -d --no-deps app
                exit 1
              fi
              echo "Waiting for app to be ready... ($i/30)"
              sleep 10
            done
            
            # Cleanup old images
            docker image prune -f
            
            echo "🚀 Deployment successful!"
          else
            echo "⏭️ Skipping deployment (server unchanged)"
          fi
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key