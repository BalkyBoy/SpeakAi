name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build and export
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/docker/Dockerfile
        tags: speak-ai:latest
        outputs: type=docker,dest=/tmp/speak-ai.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: /tmp/speak-ai.tar
        retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp
        
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
         
    - name: Copy Docker image to server
      run: |
        scp -i ~/.ssh/id_rsa /tmp/speak-ai.tar ubuntu@${{ secrets.EC2_HOST }}:/tmp/
        
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          
          # Load the new image
          docker load -i /tmp/speak-ai.tar
          
          # Navigate to server directory
          cd ~/speak-ai/SpeakAi
          
          # Configure git with authentication
          git config --global credential.helper store
          echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          
          # Pull latest updates from repository
          git pull origin main
          
          # Navigate to docker directory
          cd server/docker
          
          # Stop and remove existing containers to force restart
          docker compose -f docker-compose.prod.yml down
          
          # Deploy with docker compose (recreate containers)
          docker compose -f docker-compose.prod.yml up -d
          
          # Wait for app to be healthy
          echo "Waiting for application to start..."
          sleep 10
          
          # Show logs
          docker compose -f docker-compose.prod.yml logs --tail=50 app
          
          # Cleanup old images
          docker image prune -f
          
          # Remove tar file
          rm -f /tmp/speak-ai.tar
        EOF
        
    - name: Cleanup
      if: always()
      run: |
        rm -f ~/.ssh/id_rsa