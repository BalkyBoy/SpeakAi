

services:
  app:
    image: ${COMPOSE_APP_IMAGE:-ghcr.io/balkyboy/speakai:latest}
    restart: always
    ports:
      - "5000:5000"
    expose:
      - '5000'
    env_file:
      - .env
  migrate:
    image: ${COMPOSE_APP_IMAGE:-ghcr.io/balkyboy/speakai:latest}
    depends_on:
      - db
    env_file:
      - .env
    command: >
      sh -c "npx prisma migrate deploy"

  db:
    image: postgres:15-alpine
    container_name: ${DATABASE_HOST}
    restart: always
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    ports: # TODO: Remove this line in production
      - '5433:${DATABASE_PORT}'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
