version: '3.8'

services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - app-network
  

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    expose:
      - "5000"
    environment:
      - DATABASE_URL=postgresql://postgres:Tikky2024@db:5432/speak
      - JWT_SECRET=92f9312f2681378d6077ee69581ec4d1
      - JWT_REFRESH_SECRET=71fe1f33b2f23dcd9fb303ed6039b2b1
      - PORT=5000
      - RESEND_API_KEY=re_4P1dCFuD_7TeeFqM9e4rHu1F1GVZRhmqi
      - FROM_EMAIL=SpeakAI <noreply@speak-ai.xyz>
      - NODE_ENV=production
    depends_on:
      - db
      - redis
    env_file:
      - ../.env
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: speak-ai-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Tikky2024
      - POSTGRES_DB=speak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass "AeBEAAIncDJjZWUzYTg2OTRkMjk0MmI0OWM4NTRiNDBiYzg5YzY2MnAyNTc0MTI"
    volumes:
      - redis_data:/data
    networks:
      - app-network 
  

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_challenges:

networks:
  app-network:
    driver: bridge


